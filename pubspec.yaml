name: jusplay
description: "JUSPlay - Just yoUr Subsonic Player"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  collection: ^1.19.1

  # UI
  go_router: ^14.8.0
  flutter_slidable: ^3.1.1
  palette_generator: ^0.3.3+4
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
