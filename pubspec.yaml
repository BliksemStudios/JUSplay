name: jusplay
description: "JUSPlay - Just yoUr Subsonic Player"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Audio
  just_audio: ^0.9.42
  audio_service: ^0.18.17

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.4

  # Utilities
  crypto: ^3.0.6
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1
  collection: ^1.19.1

  # UI
  go_router: ^14.8.0
  flutter_slidable: ^3.1.1
  palette_generator: ^0.3.3+4
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  flutter_dynamic_icon: ^2.1.0
  google_generative_ai: ^0.4.7
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_gold.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/icon_gold.png"

flutter_native_splash:
  color: "#121212"
  color_dark: "#121212"
  image: "assets/images/icon_gold.png"
  android_12:
    color: "#121212"
    icon_background_color: "#121212"
    image: "assets/images/icon_gold.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
