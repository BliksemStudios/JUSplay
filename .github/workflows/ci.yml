name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Patch flutter_dynamic_icon for AGP 8+ and Flutter V2
        run: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/flutter_dynamic_icon-2.1.0/android"
          # 1) Fix namespace for AGP 8+
          BUILD="$PLUGIN_DIR/build.gradle"
          if [ -f "$BUILD" ] && ! grep -q 'namespace' "$BUILD"; then
            sed -i "s|android {|android {\n    namespace 'io.github.tastelessjolt.flutterdynamicicon'|" "$BUILD"
          fi
          # 2) Replace V1 embedding plugin with clean V2 implementation
          JAVA="$PLUGIN_DIR/src/main/java/io/github/tastelessjolt/flutterdynamicicon/FlutterDynamicIconPlugin.java"
          cat > "$JAVA" << 'PATCH'
          package io.github.tastelessjolt.flutterdynamicicon;
          import android.content.Context;
          import io.flutter.embedding.engine.plugins.FlutterPlugin;
          import io.flutter.plugin.common.BinaryMessenger;
          import io.flutter.plugin.common.MethodChannel;
          public class FlutterDynamicIconPlugin implements FlutterPlugin {
            private static final String CHANNEL_NAME = "flutter_dynamic_icon";
            private MethodChannel channel;
            @Override
            public void onAttachedToEngine(FlutterPlugin.FlutterPluginBinding binding) {
              setupChannel(binding.getBinaryMessenger(), binding.getApplicationContext());
            }
            @Override
            public void onDetachedFromEngine(FlutterPlugin.FlutterPluginBinding binding) {
              teardownChannel();
            }
            private void setupChannel(BinaryMessenger messenger, Context context) {
              channel = new MethodChannel(messenger, CHANNEL_NAME);
              channel.setMethodCallHandler(new MethodCallHandlerImpl());
            }
            private void teardownChannel() {
              channel.setMethodCallHandler(null);
              channel = null;
            }
          }
          PATCH

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    name: Build iOS
    runs-on: macos-15
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build ios --no-codesign
