name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Patch flutter_dynamic_icon for AGP 8+ and Flutter V2
        run: |
          PLUGIN_DIR="$HOME/.pub-cache/hosted/pub.dev/flutter_dynamic_icon-2.1.0/android"
          # Fix missing namespace (AGP 8+ requirement)
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q 'namespace' "$PLUGIN_DIR/build.gradle"; then
            sed -i "s|android {|android {\n    namespace 'io.github.tastelessjolt.flutterdynamicicon'|" "$PLUGIN_DIR/build.gradle"
          fi
          # Fix V1 embedding API (PluginRegistry.Registrar removed in Flutter 3.41+)
          JAVA="$PLUGIN_DIR/src/main/java/io/github/tastelessjolt/flutterdynamicicon/FlutterDynamicIconPlugin.java"
          if [ -f "$JAVA" ] && grep -q 'PluginRegistry.Registrar' "$JAVA"; then
            sed -i 's/public static void registerWith(io.flutter.plugin.common.PluginRegistry.Registrar registrar)/public static void registerWith(@SuppressWarnings("unused") Object registrar)/' "$JAVA"
          fi

      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    name: Build iOS
    runs-on: macos-15
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build ios --no-codesign
